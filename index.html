<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Presuobra PRO</title>
<style>
body { font-family: Arial; padding:20px; background:#f4f4f4; }
input, select, button { padding:10px; margin:5px 0; width:100%; max-width:300px; }
button { background:#28a745; color:white; border:0; cursor:pointer; }
button:hover { background:#218838; }
.card { background:white; padding:10px; margin:10px 0; border-radius:5px; }
h2 { margin-top:30px; }
</style>
</head>

<body>

<h1>🏗️ PRESUOBRA PRO - APP COMPLETA</h1>

<h2>👤 Cliente</h2>
<input id="cliente" placeholder="Nombre del cliente">

<h2>🧾 Presupuesto</h2>

<input id="metros" type="number" placeholder="Cantidad">

<select id="tipo">
  <option value="enfoscado">Enfoscado</option>
  <option value="demolicion">Demolición</option>
  <option value="ladrillo">Ladrillo</option>
  <option value="excavacion">Excavación</option>
  <option value="zuncho">Zuncho</option>
</select>

<button onclick="crear()">Crear presupuesto</button>

<h2 id="resultado"></h2>

<hr>

<h2>📁 Historial completo</h2>
<div id="lista"></div>

<script>

const precios = {
  enfoscado: 12,
  demolicion: 35,
  ladrillo: 0.80,
  excavacion: 25,
  zuncho: 45
};

function crear() {
  let cliente = document.getElementById("cliente").value || "Sin cliente";
  let cantidad = parseFloat(document.getElementById("metros").value);
  let tipo = document.getElementById("tipo").value;

  if (!cantidad || cantidad <= 0) {
    document.getElementById("resultado").innerText = "Cantidad inválida";
    return;
  }

  let total = cantidad * precios[tipo];

  let presupuesto = {
    cliente: cliente,
    tipo: tipo,
    cantidad: cantidad,
    total: total,
    fecha: new Date().toLocaleDateString()
  };

  let datos = JSON.parse(localStorage.getItem("app_presuobra")) || [];
  datos.push(presupuesto);
  localStorage.setItem("app_presuobra", JSON.stringify(datos));

  document.getElementById("resultado").innerHTML =
    "💰 Total: " + total.toFixed(2) + " €";

  mostrar();
}

function mostrar() {
  let datos = JSON.parse(localStorage.getItem("app_presuobra")) || [];

  let html = "";

  datos.forEach(p => {
    html += `
      <div class="card">
        <strong>👤 ${p.cliente}</strong><br>
        🧱 ${p.tipo}<br>
        📏 ${p.cantidad}<br>
        💰 ${p.total.toFixed(2)} €<br>
        📅 ${p.fecha}
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

mostrar();

</script>

</body>
</html>
