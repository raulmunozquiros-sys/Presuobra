<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Presuobra PRO</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    h1 {
      color: #333;
    }

    input, select, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      max-width: 300px;
    }

    button {
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }

    .card {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>🏗️ Presuobra PRO</h1>

<h2>💰 Crear presupuesto</h2>

<input id="metros" type="number" placeholder="Metros / Cantidad">

<select id="tipo">
  <option value="enfoscado">Enfoscado (12 €/m²)</option>
  <option value="demolicion">Demolición (35 €/m³)</option>
  <option value="ladrillo">Ladrillo (0,80 €/ud)</option>
  <option value="excavacion">Excavación (25 €/m³)</option>
  <option value="zuncho">Zuncho hormigón (45 €/ml)</option>
</select>

<button onclick="calcular()">Crear presupuesto</button>

<h2 id="resultado"></h2>

<hr>

<h2>📁 Historial de presupuestos</h2>
<div id="lista"></div>

<script>
const precios = {
  enfoscado: 12,
  demolicion: 35,
  ladrillo: 0.80,
  excavacion: 25,
  zuncho: 45
};

function calcular() {
  let m2 = parseFloat(document.getElementById("metros").value);
  let tipo = document.getElementById("tipo").value;

  if (!m2 || m2 <= 0) {
    document.getElementById("resultado").innerText = "Introduce una cantidad válida";
    return;
  }

  let total = m2 * precios[tipo];

  let presupuesto = {
    tipo: tipo,
    cantidad: m2,
    total: total
  };

  let lista = JSON.parse(localStorage.getItem("presupuestos")) || [];
  lista.push(presupuesto);
  localStorage.setItem("presupuestos", JSON.stringify(lista));

  document.getElementById("resultado").innerHTML =
    "💰 TOTAL: " + total.toFixed(2) + " €";

  mostrarLista();
}

function mostrarLista() {
  let lista = JSON.parse(localStorage.getItem("presupuestos")) || [];

  let html = "";

  lista.forEach((p, i) => {
    html += `
      <div class="card">
        <strong>${p.tipo}</strong><br>
        Cantidad: ${p.cantidad}<br>
        Total: ${p.total.toFixed(2)} €
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

mostrarLista();
</script>

</body>
</html>
