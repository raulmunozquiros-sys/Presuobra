<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PresuObra</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
header{
    background:#1f2937;
    color:white;
    padding:20px;
    text-align:center;
}
main{
    max-width:1000px;
    margin:auto;
    padding:30px;
}
.card{
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}
button{
    background:#2563eb;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}
button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<header>
<h1>🏗️ PresuObra</h1>
<p>Gestión profesional de presupuestos de reformas</p>
</header>

<main>

<div class="card">

<h2>Bienvenido</h2>

<p>Esta es la primera versión de PresuObra.</p>

<button>Nuevo presupuesto</button>

</div>

</main>

</body>
</html>
